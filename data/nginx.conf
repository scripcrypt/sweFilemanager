server {
    # 撪晹揑偵偼 80 偱懸偪庴偗傑偡乮Railway偑 443 傪 80 偵曄姺偟偰偔傟傑偡乯
    listen 80;
    server_name _;

    root /var/www/web;
    index index.php index.html;

    # 僒儉僱僀儖偺儕儔僀僩
    location ~ /thumb/ {
        # 偙偙偺僷僗偑廳梫偱偡丅/img.php 偑 root 偺捈壓偵偁傞偐妋擣偟偰偔偩偝偄
        try_files $uri /img.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        # Railway忋偺PHP僐儞僥僫傊偺愙懕愝掕
        fastcgi_pass 127.0.0.1:9000; 
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}