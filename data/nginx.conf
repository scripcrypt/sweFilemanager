events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        # Railwayの環境変数 PORT に対応させるため、
        # もし Variables に PORT があればその番号（例: 3000）に変えてください。
        # なければ 80 のままで。
        listen 80;
        server_name _;

        # Nixpacksの標準的なパスは /app/public か /app です
        root /app; 
        index index.php index.html;

        # サムネイルのリライト
        location ~ /thumb/ {
            try_files $uri /img.php?$query_string;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            # Nixpacks環境では、PHPはネットワーク越し(php:9000)ではなく
            # 同じコンテナ内の Unixソケットで動いていることが多いです。
            # 一旦 127.0.0.1:9000 で試してダメならログを見て調整します。
            fastcgi_pass 127.0.0.1:9000;
        }
    }
}