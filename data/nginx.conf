server {
    # 80番ポートで待ち受け。SSLはRailway側が勝手に処理してくれます。
    listen 80;
    
    # Railwayの独自ドメインやカスタムドメインに反応するように設定
    server_name _;

    # サイトのルートディレクトリ
    root /var/www/web;
    index index.php index.html;

    client_max_body_size 2G;

    # --- 今回やりたかったリライト設定 ---
    location ~ /thumb/ {
        # /thumb/ を含むリクエストは img.php に飛ばす
        try_files $uri /img.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHPの処理設定
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Dockerコンテナ名や、同一コンテナ内なら localhost/127.0.0.1
        fastcgi_pass php:9000;
    }
}