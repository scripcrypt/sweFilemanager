<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sweFilemanager</title>
    <link rel="stylesheet" href="./public/styles.css" />
  </head>
  <body>
    <!--
      sweFilemanager の UI ルート。
      - こちらはプロジェクト直下の index.html（/public ではない）
      - CSS/JS 参照先が `./public/*` になる
    -->
    <div class="sweFilemanager">
      <header class="swefm-topbar">
        <div class="swefm-brand">sweFilemanager</div>
        <div class="swefm-actions">
          <!-- ルート切替（config.json の roots） -->
          <select id="root-select" class="swefm-select"></select>
          <!-- 表示モード切替 -->
          <button id="btn-view-list">リスト</button>
          <button id="btn-view-icons">アイコン</button>
          <!-- ナビゲーション/操作 -->
          <button id="btn-up">上へ</button>
          <button id="btn-refresh">更新</button>
          <button id="btn-mkdir">フォルダ作成</button>
          <button id="btn-touch">ファイル作成</button>
          <button id="btn-delete" disabled>削除</button>
          <button id="btn-upload">アップロード</button>
          <input id="file-upload" type="file" multiple hidden />
        </div>
      </header>

      <main class="swefm-workbench">
        <aside class="swefm-sidebar">
          <div class="swefm-sidebar-title">EXPLORER</div>
          <div class="swefm-sidebar-section">
            <div class="swefm-sidebar-section-title">FILES</div>
            <!-- 左ツリー（フォルダ/ファイル）。JS が中身を描画する -->
            <div id="tree" class="swefm-tree" role="tree" aria-label="Explorer"></div>
          </div>
        </aside>

        <section class="swefm-content">
          <!-- パンくず（現在パス） -->
          <div class="swefm-path" id="breadcrumb"></div>
          <div class="swefm-panel">
            <!-- アイコン表示（grid）。JS が切替/描画する -->
            <div id="grid" class="swefm-grid" hidden></div>
            <!-- リスト表示（table）。JS が描画する -->
            <table id="table" class="swefm-table">
              <thead>
                <tr>
                  <th>名前</th>
                  <th class="col-size">サイズ</th>
                  <th class="col-mtime">更新</th>
                  <th class="col-actions">操作</th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
          <!-- ステータス表示（エラー/進捗テキストなど） -->
          <div class="swefm-status" id="status"></div>
        </section>
      </main>

      <!-- エントリポイント（store/commands/view を初期化） -->
      <script type="module" src="./public/main.js"></script>

      <div id="upload-modal" class="swefm-modal" hidden>
        <div id="upload-modal-backdrop" class="swefm-modal-backdrop"></div>
        <div class="swefm-modal-dialog" role="dialog" aria-modal="true" aria-label="Upload">
          <div id="upload-busy" class="swefm-upload-busy" hidden>
            <div class="swefm-spinner" aria-hidden="true"></div>
          </div>
          <div class="swefm-modal-header">
            <div class="swefm-modal-title">アップロード</div>
            <div class="swefm-modal-actions">
              <button id="btn-upload-choose" class="swefm-btn-primary">ファイルを選ぶ</button>
              <button id="btn-upload-close" class="swefm-modal-close">閉じる</button>
            </div>
          </div>
          <div id="upload-drop" class="swefm-upload-drop" role="button" tabindex="0">
            <div class="swefm-upload-drop-title">ここにドラッグ＆ドロップ</div>
            <div class="swefm-upload-drop-sub">または</div>
            <div id="upload-log" class="swefm-upload-log" aria-hidden="true"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
